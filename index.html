<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Mirror</title>
    <link rel="icon" type="image/svg+xml" href="/robot-mirror/favicon.svg" />
    <script type="module" crossorigin src="/robot-mirror/assets/index-BHOcJY9Z.js"></script>
    <link rel="stylesheet" crossorigin href="/robot-mirror/assets/index-DCzlgh8-.css">
  </head>
  <body>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="scene"></canvas>

    <div id="hud">
      <div id="top-bar">
        <div id="title">ROBOT MIRROR</div>
        <div id="room-info" class="hidden">
          Room <span id="room-code"></span>
          <button id="copy-link" type="button">copy link</button>
          <button id="face-toggle" type="button" aria-pressed="false">face: off</button>
          <span id="peer-count">1 player</span>
        </div>
      </div>
      <div id="gesture-label">—</div>
      <div id="hint">
        <b>Gestures</b><br />
        <span>Open Palm — fireworks</span><br />
        <span>Fist — warp</span><br />
        <span>Victory — shockwave</span><br />
        <span>Thumbs Up — rainbow skin</span><br />
        <span>Pointing Up — lightning</span>
      </div>
      <div id="keys">[V] camera view &nbsp; [F] fullscreen</div>
    </div>

    <div id="lobby">
      <div id="lobby-card">
        <h1>Robot Mirror</h1>
        <p>Multiplayer — see each other as pose-driven robots.</p>
        <div class="btn-row">
          <button id="host-btn" class="primary">Host a room</button>
          <div class="divider">or</div>
          <form id="join-form">
            <input id="join-code" placeholder="room code" autocomplete="off" />
            <button type="submit">Join</button>
          </form>
        </div>
        <p id="lobby-status"></p>
      </div>
    </div>

  </body>
</html>
