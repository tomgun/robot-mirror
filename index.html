<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Mirror</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="scene"></canvas>

    <div id="hud">
      <div id="title">ROBOT MIRROR</div>
      <div id="gesture-label">—</div>
      <div id="hint">
        <b>Gestures</b><br />
        <span>Open Palm — fireworks</span><br />
        <span>Fist — warp</span><br />
        <span>Victory — shockwave</span><br />
        <span>Thumbs Up — rainbow skin</span><br />
        <span>Pointing Up — lightning</span>
      </div>
      <div id="keys">
        [V] toggle camera view &nbsp; [F] fullscreen
      </div>
    </div>

    <div id="start-overlay">
      <button id="start-btn">Start Camera</button>
      <p>Allow camera access to see yourself as a robot.</p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
